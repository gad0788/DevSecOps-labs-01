
# pre-commit hooks gitleaks
repos:
  # 1. Gitleaks: The industry standard for secret detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: "Detect Hardcoded Secrets"
        description: "Fails if any API keys, tokens, or passwords are found."
        # Forces a fail on detection
        args: ["protect", "--staged", "--verbose"]

  # 2. Security & Best Practices (General)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace      # Fails on trailing spaces
      - id: end-of-file-fixer        # Ensures clean file endings
      - id: check-yaml               # Fails on invalid YAML (Critical for K8s/Cloud)
      - id: check-added-large-files  # Fails if files >500KB are added (prevents binary bloat)
        args: ['--maxkb=500']
      - id: check-merge-conflict     # Prevents committing unresolved merge markers
      - id: detect-private-key       # Specific check for SSH/PEM keys

  # 3. Cloud Engineer Specific: IaC Linting (Terraform/Tofu)
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt            # Fails on poor formatting
      - id: terraform_validate       # Fails on invalid HCL syntax
      - id: terraform_tflint         # Fails on cloud-specific best practices
      - id: terraform_checkov        # Fails on security misconfigurations (S3 public, etc.)
        args:
          - --args=--compact
          - --args=--quiet

  # 4. Kubernetes Security (If applicable)
  - repo: https://github.com/bridgecrewio/checkov
    rev: 3.2.300
    hooks:
      - id: checkov
        name: "Security Scan (IaC & K8s)"
